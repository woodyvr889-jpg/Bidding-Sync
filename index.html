<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bidding Sync</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="soft-bg">

  <div class="login-container">
    <h1>Bidding Sync</h1>
    <p>Please select your name</p>

    <div class="name-grid">
      <button data-user="James">James</button>
      <button data-user="Uncle Paul">Uncle Paul</button>
      <button data-user="Uncle Lee">Uncle Lee</button>
      <button data-user="Grandad Steve">Grandad Steve</button>
      <button data-user="Grandma Jean">Grandma Jean</button>
      <button data-user="Dad">Dad</button>
      <button data-user="Mum">Mum</button>
      <button data-user="Auntie Emily">Auntie Emily</button>
      <button data-user="Nannan">Nannan</button>
      <button data-user="Grandad Darren">Grandad Darren</button>
    </div>

    <div id="passcodeBox" class="passcode-box" style="display:none;">
      <input type="password" id="passcodeInput" placeholder="Enter passcode">
      <button id="verifyBtn">Enter</button>
    </div>
  </div>

  <!-- Load JS at the bottom to ensure buttons work -->
  <script src="appscript.js"></script>
  <script>
    // Attach click events to buttons
    document.querySelectorAll(".name-grid button").forEach(btn => {
      btn.addEventListener("click", () => {
        selectUser(btn.dataset.user);
      });
    });

    // Attach verify button
    document.getElementById("verifyBtn").addEventListener("click", () => {
      verifyPasscode();
    });
  </script>

</body>
</html>
